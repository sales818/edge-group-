!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDGE GROUP CORP</title>
<link rel="stylesheet" href="style.css">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="EDGE Logo">
        <h1>EDGE</h1>
    </div>

    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero">
    <div class="overlay" data-aos="fade-up">
        <h2>ENGINEERED TO PERFECTION</h2>
        <p>Formwork • Steel Fixing • Concrete</p>
        <a href="#contact" class="btn">Get a Quote</a>
    </div>
</section>

<section id="services" class="section">
    <h2 data-aos="fade-up">Our Services</h2>
    <div class="cards">
        <div class="card">Formwork</div>
        <div class="card">Steel Fixing</div>
        <div class="card">Concrete</div>
    </div>
</section>

<section id="projects" class="section dark">
    <h2 data-aos="fade-up">Our Projects</h2>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
        <img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
        <img src="https://images.unsplash.com/photo-1581090700227-1e8e6e6f58c6">
    </div>
</section>

<section id="contact" class="section contact">
    <h2>Contact Us</h2>

    <!-- FORM -->
    <form action="https://formsubmit.co/info@edgegroup.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <p>📞 <a href="tel:0400000000">Call Now</a></p>
</section>

<!-- GOOGLE MAP -->
<section class="map">
<iframe 
src="https://www.google.com/maps?q=Sydney&output=embed"
width="100%" height="300" style="border:0;">
</iframe>
</section>

<footer>
    <p>© 2026 EDGE GROUP CORP</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init();</script>

</body>
</html>
